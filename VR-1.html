<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VECTOR RUSH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root{
    --bg-deep: #0a0118;
    --bg-purple: #1a0a33;
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff2e87;
    --neon-yellow: #ffde2e;
    --neon-purple: #b829ff;
    --neon-orange: #ff6b35;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; overflow: hidden;
    width: 100%; height: 100%;
    background: var(--bg-deep);
    font-family: 'Share Tech Mono', monospace;
    color: var(--neon-cyan);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  #game-container { position: fixed; inset: 0; }
  #game-container canvas { display: block; width: 100%; height: 100%; }

  /* ---------- HUD ---------- */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between;
    padding: 18px 26px;
    pointer-events: none;
    z-index: 20;
    font-family: 'Orbitron', sans-serif;
  }
  .hud-block { text-align: left; }
  .hud-block.right { text-align: right; }
  .hud-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--neon-magenta);
    text-shadow: 0 0 8px var(--neon-magenta);
    opacity: 0.9;
  }
  .hud-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: 0 0 6px var(--neon-cyan), 0 0 14px rgba(0,240,255,0.6);
    letter-spacing: 2px;
  }
  .hud-value.small { font-size: 18px; color: var(--neon-yellow); text-shadow: 0 0 6px var(--neon-yellow), 0 0 14px rgba(255,222,46,0.6); }
  .hud-value.kills { font-size: 28px; color: var(--neon-magenta); text-shadow: 0 0 6px var(--neon-magenta), 0 0 14px rgba(255,46,135,0.6); }
  .hud-milestone {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px; letter-spacing: 2px;
    color: var(--neon-yellow); text-shadow: 0 0 6px var(--neon-yellow);
    height: 14px; margin-top: 2px;
  }

  /* ---------- Laser cooldown bar ---------- */
  #laser-hud {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: none; flex-direction: column; align-items: center; gap: 6px;
    z-index: 20; pointer-events: none;
  }
  #laser-status-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px; letter-spacing: 4px;
    color: var(--neon-magenta);
    text-shadow: 0 0 8px var(--neon-magenta);
    transition: color 0.15s, text-shadow 0.15s;
  }
  #laser-status-label.ready {
    color: #00f0ff;
    text-shadow: 0 0 10px #00f0ff, 0 0 22px rgba(0,240,255,0.7);
    animation: pulse-ready 0.6s ease-in-out infinite alternate;
  }
  @keyframes pulse-ready {
    from { opacity: 0.75; }
    to   { opacity: 1.0; }
  }
  #laser-track {
    width: 220px; height: 8px;
    background: rgba(255,46,135,0.1);
    border: 1px solid rgba(255,46,135,0.35);
    border-radius: 4px; overflow: hidden;
    box-shadow: 0 0 8px rgba(255,46,135,0.15);
  }
  #laser-fill {
    height: 100%; width: 0%;
    border-radius: 4px;
    transition: box-shadow 0.1s;
  }

  /* ---------- Overlays ---------- */
  .overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 30;
    background: radial-gradient(ellipse at center, rgba(26,10,51,0.55) 0%, rgba(10,1,24,0.92) 75%);
    text-align: center;
    transition: opacity 0.4s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; visibility: hidden; }

  .panel {
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    padding: 40px 50px;
    border: 1px solid rgba(0,240,255,0.35);
    background: rgba(10,1,24,0.6);
    box-shadow: 0 0 40px rgba(184,41,255,0.25), inset 0 0 60px rgba(0,240,255,0.05);
    max-width: 90vw;
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(40px, 10vw, 84px);
    letter-spacing: 8px;
    margin: 0;
    background: linear-gradient(180deg, #fff 0%, var(--neon-cyan) 45%, var(--neon-magenta) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 24px rgba(0,240,255,0.5);
    filter: drop-shadow(0 0 18px rgba(255,46,135,0.45));
  }

  .subtitle {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--neon-purple);
    text-shadow: 0 0 8px var(--neon-purple);
  }

  .mode-prompt {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px; letter-spacing: 5px;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px var(--neon-yellow);
    margin-top: 4px;
  }

  .sound-row {
    display: flex; align-items: center; gap: 14px;
  }
  .sound-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px; letter-spacing: 4px;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
  }
  .sound-toggle {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 16px 6px 8px;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    transition: all 0.18s ease;
  }
  .sound-toggle .sound-toggle-dot {
    width: 14px; height: 14px; border-radius: 50%;
    transition: all 0.18s ease;
  }
  .sound-toggle.on {
    border: 1.5px solid var(--neon-cyan);
    background: rgba(0,240,255,0.12);
    color: var(--neon-cyan);
    box-shadow: 0 0 14px rgba(0,240,255,0.4);
  }
  .sound-toggle.on .sound-toggle-dot {
    background: var(--neon-cyan);
    box-shadow: 0 0 10px var(--neon-cyan);
  }
  .sound-toggle.off {
    border: 1.5px solid rgba(120,120,140,0.5);
    background: rgba(120,120,140,0.08);
    color: #8a8aa0;
    box-shadow: none;
  }
  .sound-toggle.off .sound-toggle-dot {
    background: #5a5a70; box-shadow: none;
  }
  .mode-row {
    display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
  }
  .mode-btn {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    width: 130px; padding: 18px 12px;
    background: rgba(0,240,255,0.04);
    border: 1.5px solid rgba(0,240,255,0.4);
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: 'Orbitron', sans-serif;
  }
  .mode-btn:hover, .mode-btn:focus {
    background: rgba(0,240,255,0.12);
    border-color: var(--neon-cyan);
    box-shadow: 0 0 22px rgba(0,240,255,0.5), inset 0 0 18px rgba(0,240,255,0.08);
    transform: translateY(-2px);
  }
  .mode-btn:active { transform: translateY(0); }
  .mode-btn .mode-icon { font-size: 30px; line-height: 1; }
  .mode-btn .mode-name {
    font-size: 14px; font-weight: 700; letter-spacing: 2px;
    color: var(--neon-cyan); text-shadow: 0 0 6px var(--neon-cyan);
  }
  .mode-btn .mode-sub {
    font-size: 9px; letter-spacing: 1.5px;
    color: var(--neon-magenta); text-shadow: 0 0 5px var(--neon-magenta);
  }
  .mode-btn.vr-disabled {
    opacity: 0.4; cursor: not-allowed;
    border-color: rgba(120,120,140,0.4);
  }
  .mode-btn.vr-disabled:hover {
    background: rgba(0,240,255,0.04); box-shadow: none; transform: none;
    border-color: rgba(120,120,140,0.4);
  }
  #vr-unsupported {
    font-size: 11px; letter-spacing: 1px;
    color: var(--neon-orange);
    text-shadow: 0 0 6px var(--neon-orange);
    max-width: 360px;
  }

  .controls-hint {
    display: flex; gap: 26px; flex-wrap: wrap; justify-content: center;
    font-size: 13px;
    color: var(--neon-cyan);
    letter-spacing: 1px;
    opacity: 0.85;
  }
  .controls-hint span { white-space: nowrap; }
  .key {
    display: inline-block;
    border: 1px solid var(--neon-cyan);
    border-radius: 4px;
    padding: 2px 8px;
    margin: 0 2px;
    box-shadow: 0 0 6px rgba(0,240,255,0.5);
  }

  .neon-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    letter-spacing: 5px;
    font-weight: 700;
    background: transparent;
    color: var(--neon-yellow);
    border: 2px solid var(--neon-yellow);
    padding: 14px 38px;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(255,222,46,0.4), inset 0 0 12px rgba(255,222,46,0.1);
    text-shadow: 0 0 8px var(--neon-yellow);
    transition: all 0.15s ease;
    margin-top: 6px;
  }
  .neon-btn:hover, .neon-btn:focus {
    background: rgba(255,222,46,0.12);
    box-shadow: 0 0 24px rgba(255,222,46,0.7), inset 0 0 18px rgba(255,222,46,0.2);
    transform: translateY(-1px);
  }
  .neon-btn:active { transform: translateY(1px); }

  .gameover-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(34px, 8vw, 60px);
    letter-spacing: 6px;
    color: var(--neon-magenta);
    text-shadow: 0 0 18px var(--neon-magenta), 0 0 40px rgba(255,46,135,0.5);
    margin: 0;
  }

  .stat-row { display: flex; gap: 40px; }
  .stat { text-align: center; }
  .stat-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px; letter-spacing: 3px;
    color: var(--neon-purple);
    text-shadow: 0 0 6px var(--neon-purple);
  }
  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 36px; font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
  }
  .new-best {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px; letter-spacing: 3px;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px var(--neon-yellow);
    height: 16px;
  }

  /* ---------- CRT scanlines & vignette ---------- */
  #scanlines {
    position: fixed; inset: 0; z-index: 40; pointer-events: none;
    background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
    mix-blend-mode: overlay;
  }
  #vignette {
    position: fixed; inset: 0; z-index: 41; pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
  }
  #flash {
    position: fixed; inset: 0; z-index: 45; pointer-events: none;
    background: #fff; opacity: 0;
  }

  /* ---------- Touch controls ---------- */
  #touch-controls {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 25;
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 22px 28px calc(22px + env(safe-area-inset-bottom));
    pointer-events: none;
    background: linear-gradient(to top, rgba(10,1,24,0.92) 0%, rgba(10,1,24,0.7) 55%, rgba(10,1,24,0) 100%);
    border-top: 1px solid rgba(184,41,255,0.3);
  }
  #joystick-base {
    position: relative;
    width: 124px; height: 124px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,240,255,0.4);
    background: radial-gradient(circle at center, rgba(0,240,255,0.08), rgba(0,240,255,0.02) 70%, transparent);
    box-shadow: 0 0 16px rgba(0,240,255,0.18), inset 0 0 24px rgba(0,240,255,0.06);
    pointer-events: auto;
    touch-action: none;
  }
  #joystick-thumb {
    position: absolute; left: 50%; top: 50%;
    width: 54px; height: 54px;
    margin: -27px 0 0 -27px;
    border-radius: 50%;
    border: 1.5px solid var(--neon-cyan);
    background: radial-gradient(circle at 35% 30%, rgba(0,240,255,0.55), rgba(0,240,255,0.15));
    box-shadow: 0 0 14px rgba(0,240,255,0.6), inset 0 0 10px rgba(255,255,255,0.25);
    will-change: transform;
  }
  .touch-btn {
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(0,240,255,0.45);
    background: rgba(0,240,255,0.06);
    color: var(--neon-cyan);
    font-size: 22px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,240,255,0.2);
  }
  .touch-btn:active { background: rgba(0,240,255,0.25); }
</style>
</head>
<body>

<div id="game-container"></div>

<div id="hud" style="display:none;">
  <div class="hud-block">
    <div class="hud-label">TIME SURVIVED</div>
    <div class="hud-value" id="score-display">00.0</div>
  </div>
  <div class="hud-block" style="text-align:center;">
    <div class="hud-label">KILLS</div>
    <div class="hud-value kills" id="kills-display">0</div>
    <div class="hud-milestone" id="milestone-display"></div>
  </div>
  <div class="hud-block right">
    <div class="hud-label">VELOCITY</div>
    <div class="hud-value small" id="speed-display">x1.0</div>
  </div>
</div>

<div id="laser-hud">
  <div id="laser-status-label">LASER COOLING</div>
  <div id="laser-track"><div id="laser-fill"></div></div>
</div>

<div id="start-screen" class="overlay">
  <div class="panel">
    <h1 class="title">VECTOR RUSH</h1>
    <div class="subtitle">// ENDLESS POLYGON FIELD //</div>
    <div class="sound-row">
      <span class="sound-label">SOUND</span>
      <button class="sound-toggle on" id="sound-toggle">
        <span class="sound-toggle-dot"></span>
        <span class="sound-toggle-text">ON</span>
      </button>
    </div>
    <div class="mode-prompt">SELECT YOUR PLATFORM</div>
    <div class="mode-row">
      <button class="mode-btn" id="mode-desktop">
        <span class="mode-icon">&#9000;</span>
        <span class="mode-name">DESKTOP</span>
        <span class="mode-sub">ARROWS · SPACE</span>
      </button>
      <button class="mode-btn" id="mode-phone">
        <span class="mode-icon">&#128241;</span>
        <span class="mode-name">PHONE</span>
        <span class="mode-sub">TOUCH PAD</span>
      </button>
      <button class="mode-btn" id="mode-vr">
        <span class="mode-icon">&#129488;</span>
        <span class="mode-name">VR HEADSET</span>
        <span class="mode-sub">QUEST · WEBXR</span>
      </button>
    </div>
    <div class="controls-hint" id="controls-hint-desktop">
      <span><span class="key">&#8593;</span><span class="key">&#8595;</span><span class="key">&#8592;</span><span class="key">&#8594;</span> STEER</span>
      <span><span class="key">SPACE</span> SHOOT</span>
      <span>AVOID THE SHAPES · 5 KILLS = -0.1x SPEED</span>
    </div>
    <div id="vr-unsupported" style="display:none;"></div>
  </div>
</div>

<div id="gameover-screen" class="overlay hidden">
  <div class="panel">
    <h2 class="gameover-title">SIGNAL LOST</h2>
    <div class="stat-row">
      <div class="stat">
        <div class="stat-label">TIME</div>
        <div class="stat-value" id="final-score">00.0</div>
      </div>
      <div class="stat">
        <div class="stat-label">KILLS</div>
        <div class="stat-value" id="final-kills">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">BEST</div>
        <div class="stat-value" id="best-score">00.0</div>
      </div>
    </div>
    <div class="new-best" id="new-best-label"></div>
    <button class="neon-btn" id="restart-btn">RETRY</button>
  </div>
</div>

<div id="scanlines"></div>
<div id="vignette"></div>
<div id="flash"></div>

<div id="touch-controls">
  <div id="joystick-base">
    <div id="joystick-thumb"></div>
  </div>
  <div style="display:flex;align-items:center;pointer-events:auto;">
    <div class="touch-btn" id="touch-fire-btn" style="width:80px;height:80px;font-size:15px;letter-spacing:1px;font-family:'Orbitron',sans-serif;border-color:rgba(255,46,135,0.7);background:rgba(255,46,135,0.08);color:#ff2e87;box-shadow:0 0 14px rgba(255,46,135,0.3);">FIRE</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  // ============================================================
  //  SETUP
  // ============================================================
  const container = document.getElementById('game-container');
  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 3, 8);

  // camera rig — in VR the headset drives the camera pose, so we move this group
  // to position the player in the world instead of moving the camera directly.
  const cameraRig = new THREE.Group();
  cameraRig.add(camera);
  scene.add(cameraRig);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  container.appendChild(renderer.domElement);

  scene.fog = new THREE.FogExp2(0x0a0118, 0.013);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ============================================================
  //  AUDIO ENGINE (procedural Web Audio — no files)
  // ============================================================
  const Audio = (function(){
    let ctx = null;
    let master = null;        // master gain (mute switch)
    let musicGain = null;     // music bus
    let sfxGain = null;       // sfx bus
    let enabled = true;       // chosen on the loading screen
    let started = false;      // music loop running
    let musicNodes = [];      // persistent oscillators
    let intensity = 0;        // 0..1, driven by game speed
    let filterNode = null;
    let arpTimer = null;

    // Tron-ish progression (root notes, Hz) — minor, brooding
    const BASS_SEQ = [55.00, 55.00, 48.99, 51.91]; // A1, A1, G1, G#1
    const ARP_SCALE = [220.00, 261.63, 329.63, 392.00, 440.00, 329.63, 261.63, 220.00]; // A minor-ish
    let seqStep = 0;
    let arpStep = 0;

    function ensureCtx(){
      if (ctx) return;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) { enabled = false; return; }
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = enabled ? 1 : 0;
      master.connect(ctx.destination);

      musicGain = ctx.createGain();
      musicGain.gain.value = 0.0;
      sfxGain = ctx.createGain();
      sfxGain.gain.value = 0.9;
      musicGain.connect(master);
      sfxGain.connect(master);
    }

    function setEnabled(on){
      enabled = on;
      if (master) master.gain.setTargetAtTime(on ? 1 : 0, ctx.currentTime, 0.02);
    }
    function isEnabled(){ return enabled; }

    // resume must happen after a user gesture
    function resume(){
      ensureCtx();
      if (ctx && ctx.state === 'suspended') ctx.resume();
    }

    // ---- SFX: laser zap (light, spritey descending blip) ----
    function laser(level){
      if (!ctx || !enabled) return;
      const t = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'square';
      // higher level = slightly lower, beefier pitch
      const base = 1400 - Math.min((level||1)-1, 4) * 120;
      o.frequency.setValueAtTime(base, t);
      o.frequency.exponentialRampToValueAtTime(base * 0.35, t + 0.12);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.32, t + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
      // a touch of sparkle
      const o2 = ctx.createOscillator();
      o2.type = 'triangle';
      o2.frequency.setValueAtTime(base * 2, t);
      o2.frequency.exponentialRampToValueAtTime(base * 0.8, t + 0.1);
      const g2 = ctx.createGain();
      g2.gain.setValueAtTime(0.12, t);
      g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
      o.connect(g); g.connect(sfxGain);
      o2.connect(g2); g2.connect(sfxGain);
      o.start(t); o2.start(t);
      o.stop(t + 0.18); o2.stop(t + 0.14);
    }

    // ---- SFX: soft explosion / poof (filtered noise burst) ----
    function poof(big){
      if (!ctx || !enabled) return;
      const t = ctx.currentTime;
      const dur = big ? 0.55 : 0.32;
      const frames = Math.floor(ctx.sampleRate * dur);
      const buffer = ctx.createBuffer(1, frames, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < frames; i++) {
        // soft noise that fades out
        const env = Math.pow(1 - i/frames, 2);
        data[i] = (Math.random()*2 - 1) * env;
      }
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.setValueAtTime(big ? 900 : 1300, t);
      lp.frequency.exponentialRampToValueAtTime(big ? 160 : 320, t + dur);
      const g = ctx.createGain();
      g.gain.setValueAtTime(big ? 0.5 : 0.32, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      src.connect(lp); lp.connect(g); g.connect(sfxGain);
      src.start(t);

      filterNode = ctx.createBiquadFilter();
      filterNode.type = 'lowpass';
      filterNode.frequency.value = 500;
      filterNode.Q.value = 6;
      filterNode.connect(musicGain);

      // --- droning detuned saw pad (kept low so it doesn't mask the progression) ---
      const padFreqs = [110, 110.4, 164.81]; // A2, slightly detuned, + E3
      for (const f of padFreqs) {
        const o = ctx.createOscillator();
        o.type = 'sawtooth';
        o.frequency.value = f;
        const g = ctx.createGain();
        g.gain.value = 0.022;
        o.connect(g); g.connect(filterNode);
        o.start();
        musicNodes.push(o);
      }

      // --- pulsing bass via LFO on a dedicated gain ---
      const bass = ctx.createOscillator();
      bass.type = 'sawtooth';
      bass.frequency.value = BASS_SEQ[0];
      const bassGain = ctx.createGain();
      bassGain.gain.value = 0.12;
      bass.connect(bassGain); bassGain.connect(filterNode);
      bass.start();
      musicNodes.push(bass);

      const stepMs = 150; // ~100 BPM 16ths
      arpTimer = setInterval(() => {
        if (!ctx) return;
        const t = ctx.currentTime;
        // advance bass note every 8 steps
        if (arpStep % 8 === 0) {
          seqStep = (seqStep + 1) % BASS_SEQ.length;
          bass.frequency.setTargetAtTime(BASS_SEQ[seqStep], t, 0.02);
        }
        // arp blip — louder/brighter as intensity rises.
        // Routed directly to the music bus (bypassing the lowpass) so the
        // higher-pitched melody always cuts through the low drone.
        const note = ARP_SCALE[arpStep % ARP_SCALE.length];
        const o = ctx.createOscillator();
        o.type = 'square';
        o.frequency.value = note * (1 + 0.5 * (arpStep % 2)); // octave bounce
        const g = ctx.createGain();
        const amp = 0.05 + intensity * 0.07;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(amp, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
        // gentle highpass keeps it crisp and out of the bass's way
        const hp = ctx.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 180;
        o.connect(hp); hp.connect(g); g.connect(musicGain);
        o.start(t); o.stop(t + 0.16);
        arpStep++;
      }, stepMs);

      musicGain.gain.setTargetAtTime(0.5, ctx.currentTime, 0.6);
    }

      if (!started) return;
      started = false;

    const ctx = c.getContext('2d');
    const cx = size/2, cy = size/2, r = size/2 - 4;

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.closePath();
    ctx.clip();

    const grad = ctx.createLinearGradient(0, cy - r, 0, cy + r);
    grad.addColorStop(0,    '#f0d8a0');
    grad.addColorStop(0.22, '#e0a85a');
    grad.addColorStop(0.5,  '#d97f5a');
    grad.addColorStop(0.78, '#c2447a');
    grad.addColorStop(1,    '#8a2bb0');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);

    // retro horizontal slices through the lower half
    ctx.fillStyle = '#170a2e';
    let y = cy + r * 0.04;
    let h = 3;
    let gap = 7;
    while (y < cy + r) {
      ctx.fillRect(0, y, size, h);
      y += h + gap;
      h += 1.4;
      gap += 1.6;
    }
    ctx.restore();

    return new THREE.CanvasTexture(c);

    const tickMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.7, fog: false, side: THREE.DoubleSide });
    for (let i = 0; i < 4; i++){
      const tick = new THREE.Mesh(new THREE.PlaneGeometry(0.06, 0.22), tickMat);
      const a = i * Math.PI / 2;
      tick.position.set(Math.cos(a) * 0.85, Math.sin(a) * 0.85, 0);
      tick.rotation.z = a;
      reticleGroup.add(tick);
    }
  })();
  reticleGroup.visible = false;
  scene.add(reticleGroup);

  // world-space VR panel (shown on game over inside the headset)
  function makeTextPanel(lines){
    const c = document.createElement('canvas');
    c.width = 1024; c.height = 512;
    const ctx = c.getContext('2d');
    return { canvas: c, ctx, texture: new THREE.CanvasTexture(c) };
  }
  const vrPanel = (function(){
    const { canvas, ctx, texture } = makeTextPanel();
    const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, fog: false, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(12, 6), mat);
    mesh.visible = false;
    scene.add(mesh);
    function draw(title, sub1, sub2){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = 'rgba(10,1,24,0.82)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle = '#ff2e87'; ctx.lineWidth = 6;
      ctx.strokeRect(10,10,canvas.width-20,canvas.height-20);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ff2e87';
      ctx.font = 'bold 96px Orbitron, sans-serif';
      ctx.fillText(title, canvas.width/2, 180);
      ctx.fillStyle = '#00f0ff';
      ctx.font = 'bold 56px Orbitron, sans-serif';
      ctx.fillText(sub1, canvas.width/2, 300);
      ctx.fillStyle = '#ffde2e';
      ctx.font = '44px "Share Tech Mono", monospace';
      ctx.fillText(sub2, canvas.width/2, 400);
      texture.needsUpdate = true;
    }
    return { mesh, draw };
  })();

  function showVRPanel(title, sub1, sub2){
    vrPanel.draw(title, sub1, sub2);
    // place panel ahead of the head
    const headPos = new THREE.Vector3();
    const headDir = new THREE.Vector3();
    camera.getWorldPosition(headPos);
    camera.getWorldDirection(headDir);
    vrPanel.mesh.position.copy(headPos).addScaledVector(headDir, 16);
    vrPanel.mesh.lookAt(headPos);
    vrPanel.mesh.visible = true;
  }
  function hideVRPanel(){ vrPanel.mesh.visible = false; }

  function setupVRControllers(){
    if (vrController1) return; // already set up
    vrController1 = renderer.xr.getController(0);
    vrController2 = renderer.xr.getController(1);
    scene.add(vrController1);
    scene.add(vrController2);

    // 'select' (trigger) on either controller fires, or restarts after game over
    const onSelect = () => {
      if (gameMode !== 'vr') return;
      if (state === 'playing') tryShoot();
      else if (state === 'gameover') startGame();
    };
    vrController1.addEventListener('selectstart', onSelect);
    vrController2.addEventListener('selectstart', onSelect);
  }

  // Poll gamepad axes/buttons each frame while in an XR session
  function pollVRInput(){
    const session = renderer.xr.getSession();
    if (!session) return;
    vrInput.x = 0; vrInput.y = 0;
    let rightTriggerPressed = false;

    for (const source of session.inputSources) {
      if (!source.gamepad) continue;
      const gp = source.gamepad;
      const hand = source.handedness; // 'left' | 'right' | 'none'
      const axes = gp.axes;
      // Quest thumbstick is usually axes[2],axes[3]; fall back to [0],[1]
      const ax = axes.length >= 4 ? axes[2] : (axes[0] || 0);
      const ay = axes.length >= 4 ? axes[3] : (axes[1] || 0);

      if (hand === 'left') {
        vrInput.x = ax;
        vrInput.y = ay;
      }
      if (hand === 'right') {
        // trigger is button 0
        if (gp.buttons[0] && gp.buttons[0].pressed) rightTriggerPressed = true;
      }
      // if no handedness info, let either stick drive movement
      if (hand === 'none' && vrInput.x === 0 && vrInput.y === 0) {
        vrInput.x = ax; vrInput.y = ay;
      }
    }

    // edge-trigger the right-hand trigger as a shot (in addition to 'selectstart')
    if (rightTriggerPressed && !rightTriggerWasPressed && state === 'playing') {
      tryShoot();
    }
    rightTriggerWasPressed = rightTriggerPressed;
  }

  // ============================================================
  //  PLATFORM MODE SELECTION
  // ============================================================
  const controlsHintDesktop = document.getElementById('controls-hint-desktop');
  const vrUnsupportedEl = document.getElementById('vr-unsupported');
  const modeVrBtn = document.getElementById('mode-vr');

  document.getElementById('mode-desktop').addEventListener('click', () => { gameMode = 'desktop'; startGame(); });
  document.getElementById('mode-phone').addEventListener('click', () => { gameMode = 'phone'; startGame(); });

  // sound on/off toggle (loading screen)
  let soundOn = true;
  const soundToggle = document.getElementById('sound-toggle');
  soundToggle.addEventListener('click', () => {
    soundOn = !soundOn;
    soundToggle.classList.toggle('on', soundOn);
    soundToggle.classList.toggle('off', !soundOn);
    soundToggle.querySelector('.sound-toggle-text').textContent = soundOn ? 'ON' : 'OFF';
    Audio.resume();
    Audio.setEnabled(soundOn);
  });

  // Probe WebXR support and wire the VR button accordingly
  if (navigator.xr && navigator.xr.isSessionSupported) {
    navigator.xr.isSessionSupported('immersive-vr').then((supported) => {
      if (!supported) disableVrButton('No VR headset detected. Open this page in your Quest browser to play in VR.');
    }).catch(() => disableVrButton('VR could not be initialised on this device.'));
  } else {
    disableVrButton('This browser does not support WebXR. Open in the Quest browser for VR.');
  }

  function disableVrButton(msg){
    modeVrBtn.classList.add('vr-disabled');
    modeVrBtn.disabled = true;
    vrUnsupportedEl.style.display = 'block';
    vrUnsupportedEl.textContent = msg;
  }

  modeVrBtn.addEventListener('click', () => {
    if (modeVrBtn.disabled) return;
    gameMode = 'vr';
    setupVRControllers();
    // request the immersive session, then start the game once it begins
    const sessionInit = { optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'] };
    navigator.xr.requestSession('immersive-vr', sessionInit).then((session) => {
      renderer.xr.setReferenceSpaceType('local');
      renderer.xr.setSession(session).then(() => {
        startGame();
      });
      session.addEventListener('end', () => {
        // returning from VR — show start screen again
        state = 'start';
        Audio.stopMusic();
        reticleGroup.visible = false;
        hud.style.display = 'none';
        laserHud.style.display = 'none';
        startScreen.classList.remove('hidden');
        gameoverScreen.classList.add('hidden');
      });
    }).catch((err) => {
      disableVrButton('Could not start VR session: ' + (err && err.message ? err.message : err));
    });
  });

  // ============================================================
  //  UI ELEMENTS
  // ============================================================
  const hud = document.getElementById('hud');
  const scoreDisplay = document.getElementById('score-display');
  const speedDisplay = document.getElementById('speed-display');
  const killsDisplay = document.getElementById('kills-display');
  const milestoneDisplay = document.getElementById('milestone-display');
  const laserFill = document.getElementById('laser-fill');
  const laserStatusLabel = document.getElementById('laser-status-label');
  const laserHud = document.getElementById('laser-hud');
  const startScreen = document.getElementById('start-screen');
  const gameoverScreen = document.getElementById('gameover-screen');
  const finalScoreEl = document.getElementById('final-score');
  const finalKillsEl = document.getElementById('final-kills');
  const bestScoreEl = document.getElementById('best-score');
  const newBestLabel = document.getElementById('new-best-label');
  const flashEl = document.getElementById('flash');

  document.getElementById('restart-btn').addEventListener('click', () => startGame());

  // ============================================================
  //  GAME STATE
  // ============================================================
  let state = 'start'; // 'start' | 'playing' | 'gameover'
  let gameMode = 'desktop'; // 'desktop' | 'phone' | 'vr'
  let elapsed = 0;
  let distanceTraveled = 0;
  let bestTime = 0;

  const BASE_SPEED = 16;
  const MAX_SPEED = 90;
  const ACCEL = 0.5333; // -> 2.0x by ~30s
  const MOVE_SPEED = 9.5;
  const VR_SPEED_FACTOR = 0.92; // close to desktop, slight reduction for comfort

  // ============================================================
  //  LASER SYSTEM
  // ============================================================
  const SHOT_COOLDOWN = 1.0;
  let lastShotTime = -999;
  let currentSpeed = BASE_SPEED;
  let destroyedCount = 0;
  let nextBossMilestone = 2; // next velocity multiplier (2.0x, 3.0x, ...) that spawns a boss
  const activeLasers = [];
  const impactFlashes = [];

  // cache glow texture for laser use
  const _sharedGlowTex = createGlowTexture();

  function tryShoot(){
    if (state !== 'playing') return;
    if (elapsed - lastShotTime < SHOT_COOLDOWN) return;
    lastShotTime = elapsed;
    spawnLaser();
    Audio.laser(getLaserLevel());
  }

  // Add kills and fire the 5-kill milestone message for each multiple crossed.
  function addKills(n){
    const before = destroyedCount;
    destroyedCount += n;
    const crossed = Math.floor(destroyedCount / 5) - Math.floor(before / 5);
    if (crossed > 0) {
      milestoneDisplay.textContent = `LASER LV.${getLaserLevel()} · -0.1x VELOCITY!`;
      clearTimeout(addKills._t);
      addKills._t = setTimeout(() => { milestoneDisplay.textContent = ''; }, 2000);
    }
  }

  // Spawn a boss by converting one obstacle slot. Prefer a slot that's far ahead
  // and not already a boss, so we don't pop one in right on top of the player.
  function spawnBoss(){
    // don't stack bosses — at most one active at a time
    if (obstacles.some(o => o.userData.isBoss)) return;
    let candidate = null;
    let bestZ = Infinity;
    for (const ob of obstacles) {
      if (ob.userData.isBoss) continue;
      // pick the one furthest away (most negative z) so the swap is least jarring
      if (ob.position.z < bestZ) { bestZ = ob.position.z; candidate = ob; }
    }
    if (candidate) makeBoss(candidate);
  }

  // laser level colours: magenta → orange → yellow → cyan → white
  const LASER_COLORS = [0xff2e87, 0xff6b35, 0xffde2e, 0x00f0ff, 0xffffff];

  function getLaserLevel(){ return Math.floor(destroyedCount / 10) + 1; }

  function spawnLaser(){
    const level  = getLaserLevel();
    const color  = LASER_COLORS[Math.min(level - 1, LASER_COLORS.length - 1)];
    const girth  = 0.055 * level;   // cylinder radius scales with level
    const length = 3.8;

    // bolt body - cylinder aligned to Z axis
    const boltGeo = new THREE.CylinderGeometry(girth, girth, length, 8);
    boltGeo.rotateX(Math.PI / 2);
    const boltMat = new THREE.MeshBasicMaterial({ color, fog: false });
    const bolt = new THREE.Mesh(boltGeo, boltMat);

    // bright core line for crispness
    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0,0,0, 0,0,-4.5]), 3));
    const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, fog: false, transparent: true, opacity: 0.8 });
    const line = new THREE.Line(lineGeo, lineMat);

    // glow sprite at tip — scales with level
    const glowMat = new THREE.SpriteMaterial({
      map: _sharedGlowTex, color, transparent: true,
      blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.85, fog: false
    });
    const glowSpr = new THREE.Sprite(glowMat);
    const glowSize = 2.0 * level;
    glowSpr.scale.set(glowSize, glowSize, 1);
    glowSpr.position.z = -length / 2;

    // ambient body glow (wider, softer) — also scales
    const bodyGlowMat = new THREE.SpriteMaterial({
      map: _sharedGlowTex, color, transparent: true,
      blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.3, fog: false
    });
    const bodyGlow = new THREE.Sprite(bodyGlowMat);
    bodyGlow.scale.set(glowSize * 1.6, glowSize * 0.5, 1);

    const group = new THREE.Group();
    group.add(bolt);
    group.add(line);
    group.add(glowSpr);
    group.add(bodyGlow);
    group.position.copy(ship.position);

    // direction of travel: straight ahead (-Z) by default, or toward the
    // head-gaze reticle in VR mode.
    const dir = new THREE.Vector3(0, 0, -1);
    if (gameMode === 'vr' && reticleGroup.visible) {
      dir.copy(reticleGroup.position).sub(ship.position).normalize();
    }
    // nudge the start point a bit along the firing direction
    group.position.addScaledVector(dir, 1.2);
    // orient the bolt to point along dir
    group.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, -1), dir);
    scene.add(group);

    // collision radius scales with level
    const radius = 0.15 * level;
    const velocity = dir.clone().multiplyScalar(currentSpeed * 2);
    activeLasers.push({ group, velocity, speed: currentSpeed * 2, alive: true, radius, color });
  }

  function removeLaser(laser){
    if (!laser.alive) return;
    laser.alive = false;
    scene.remove(laser.group);
  }

  function triggerImpact(pos, color){
    color = color || 0xff2e87;
    Audio.poof(false);

    // --- central glow flash ---
    const spriteMat = new THREE.SpriteMaterial({
      map: _sharedGlowTex, color, transparent: true,
      blending: THREE.AdditiveBlending, depthWrite: false, opacity: 1.0, fog: false
    });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(4, 4, 1);
    sprite.position.copy(pos);
    scene.add(sprite);

    // --- point light burst ---
    const light = new THREE.PointLight(color, 5, 18);
    light.position.copy(pos);
    scene.add(light);

    // --- shockwave ring (flat torus that expands) ---
    const ringGeo = new THREE.TorusGeometry(0.1, 0.04, 6, 18);
    const ringMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9, fog: false });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(pos);
    // face the camera roughly
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);

    // --- debris shards (tiny tetrahedra flying outward) ---
    const SHARD_COUNT = 10;
    const shards = [];
    for (let i = 0; i < SHARD_COUNT; i++) {
      const size = 0.08 + Math.random() * 0.18;
      const geo = new THREE.TetrahedronGeometry(size, 0);
      const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1.0, fog: false, wireframe: Math.random() > 0.5 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(pos);
      mesh.rotation.set(Math.random()*Math.PI*2, Math.random()*Math.PI*2, Math.random()*Math.PI*2);
      scene.add(mesh);

      const speed = 3.5 + Math.random() * 7;
      const theta = Math.random() * Math.PI * 2;
      const phi = (Math.random() - 0.5) * Math.PI;
      const vx = Math.cos(phi) * Math.cos(theta) * speed;
      const vy = Math.cos(phi) * Math.sin(theta) * speed;
      const vz = Math.sin(phi) * speed;
      const spin = { x: (Math.random()-0.5)*14, y: (Math.random()-0.5)*14, z: (Math.random()-0.5)*14 };
      shards.push({ mesh, vx, vy, vz, spin });
    }

    // --- wire-frame shard lines (edge streaks) ---
    const STREAK_COUNT = 7;
    const streaks = [];
    for (let i = 0; i < STREAK_COUNT; i++) {
      const len = 0.4 + Math.random() * 0.8;
      const sGeo = new THREE.BufferGeometry();
      sGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0,0,0, 0,0,-len]), 3));
      const sMat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 1.0, fog: false });
      const line = new THREE.Line(sGeo, sMat);
      line.position.copy(pos);
      const spd = 5 + Math.random() * 9;
      const th = Math.random() * Math.PI * 2;
      const ph = (Math.random() - 0.5) * Math.PI;
      streaks.push({
        line,
        vx: Math.cos(ph)*Math.cos(th)*spd,
        vy: Math.cos(ph)*Math.sin(th)*spd,
        vz: Math.sin(ph)*spd
      });
      scene.add(line);
    }

    impactFlashes.push({ sprite, light, ring, shards, streaks, life: 1.0 });
  }

  function startGame(){
    state = 'playing';
    elapsed = 0;
    distanceTraveled = 0;
    destroyedCount = 0;
    lastShotTime = -999;
    nextBossMilestone = 2;

    // audio: resume context (user gesture) and (re)start the music bed
    Audio.resume();
    Audio.setEnabled(soundOn);
    Audio.setIntensity(0);
    Audio.startMusic();

    // clear active lasers
    for (const laser of activeLasers) scene.remove(laser.group);
    activeLasers.length = 0;
    // clear impact flashes
    for (const f of impactFlashes) {
      scene.remove(f.sprite); scene.remove(f.light); scene.remove(f.ring);
      for (const s of f.shards) scene.remove(s.mesh);
      for (const s of f.streaks) scene.remove(s.line);
    }
    impactFlashes.length = 0;

    playerPos.set(0, 2.2, 0);
    ship.position.copy(playerPos);
    ship.rotation.set(0,0,0);
    ship.visible = true;
    glowSprite.visible = true;
    // Smaller sphere in VR so it occludes less of the forward view.
    ship.scale.setScalar(gameMode === 'vr' ? 0.62 : 1);
    trailHistory.length = 0;

    for (const ob of obstacles) resetObstacle(ob, true);

    particleMat.opacity = 0;
    particleLife = 0;

    startScreen.classList.add('hidden');
    gameoverScreen.classList.add('hidden');

    const inVR = (gameMode === 'vr');
    // In VR the 2D DOM HUD/overlays aren't visible inside the headset, so hide them.
    hud.style.display = inVR ? 'none' : 'flex';
    laserHud.style.display = inVR ? 'none' : 'flex';
    reticleGroup.visible = inVR;
    hideVRPanel();

    // Touch controls only make sense on a phone.
    const touchControls = document.getElementById('touch-controls');
    if (touchControls) touchControls.style.display = (gameMode === 'phone') ? 'flex' : 'none';
  }

  function endGame(){
    state = 'gameover';
    triggerExplosion(ship.position);
    Audio.poof(true);
    Audio.stopMusic();
    ship.visible = false;
    glowSprite.visible = false;

    flashEl.style.transition = 'none';
    flashEl.style.opacity = '0.85';
    requestAnimationFrame(() => {
      flashEl.style.transition = 'opacity 0.5s ease';
      flashEl.style.opacity = '0';
    });

    if (elapsed > bestTime) {
      bestTime = elapsed;
      newBestLabel.textContent = 'NEW BEST';
    } else {
      newBestLabel.textContent = '';
    }
    finalScoreEl.textContent = elapsed.toFixed(1);
    bestScoreEl.textContent = bestTime.toFixed(1);
    finalKillsEl.textContent = destroyedCount;

    if (gameMode === 'vr') {
      setTimeout(() => {
        showVRPanel('SIGNAL LOST', `TIME ${elapsed.toFixed(1)}  ·  KILLS ${destroyedCount}`, 'PULL TRIGGER TO RETRY');
      }, 650);
    } else {
      setTimeout(() => {
        gameoverScreen.classList.remove('hidden');
      }, 650);
    }
  }

  // ============================================================
  //  MAIN LOOP
  // ============================================================
  const clock = new THREE.Clock();

  function animate(){
    const delta = Math.min(clock.getDelta(), 0.05);

    if (state === 'playing') {
      elapsed += delta;
      const speedPenalty = Math.floor(destroyedCount / 5) * 0.1 * BASE_SPEED;
      let speed = Math.min(MAX_SPEED, Math.max(BASE_SPEED, BASE_SPEED + elapsed * ACCEL - speedPenalty));
      // difficulty multiplier (independent of VR comfort scaling) drives boss milestones
      const difficultyMult = speed / BASE_SPEED;
      if (gameMode === 'vr') speed *= VR_SPEED_FACTOR; // slightly slower in VR for comfort
      currentSpeed = speed;
      distanceTraveled += speed * delta;

      // --- boss trigger: each time the multiplier first crosses 2.0x, 3.0x, ... ---
      if (difficultyMult >= nextBossMilestone) {
        spawnBoss();
        nextBossMilestone += 1;
      }

      // music intensity ramps with difficulty (1.0x..~5.6x → 0..1)
      Audio.setIntensity((difficultyMult - 1) / 4.6);

      // poll VR controllers (left stick = movement, right trigger = fire)
      if (gameMode === 'vr') pollVRInput();

      // --- movement ---
      // keyboard
      if (keys.left)  playerPos.x -= MOVE_SPEED * delta;
      if (keys.right) playerPos.x += MOVE_SPEED * delta;
      if (keys.up)    playerPos.y += MOVE_SPEED * delta;
      if (keys.down)  playerPos.y -= MOVE_SPEED * delta;
      // VR left joystick: same screen-position scheme as desktop (x = strafe, y = climb/dive)
      if (gameMode === 'vr') {
        const dead = 0.12;
        const jx = Math.abs(vrInput.x) > dead ? vrInput.x : 0;
        const jy = Math.abs(vrInput.y) > dead ? vrInput.y : 0;
        playerPos.x += jx * MOVE_SPEED * delta;
        playerPos.y -= jy * MOVE_SPEED * delta; // stick up (negative) = climb
      }
      // phone analog joystick (x = strafe, y up = climb)
      if (gameMode === 'phone') {
        const dead = 0.1;
        const jx = Math.abs(touchInput.x) > dead ? touchInput.x : 0;
        const jy = Math.abs(touchInput.y) > dead ? touchInput.y : 0;
        playerPos.x += jx * MOVE_SPEED * delta;
        playerPos.y -= jy * MOVE_SPEED * delta; // thumb up (negative) = climb
      }

      playerPos.x = THREE.MathUtils.clamp(playerPos.x, BOUNDS.xMin, BOUNDS.xMax);
      playerPos.y = THREE.MathUtils.clamp(playerPos.y, BOUNDS.yMin, BOUNDS.yMax);

      ship.position.lerp(playerPos, Math.min(1, delta * 14));

      // banking / pitch — combine keyboard + analog stick input
      let bankX = (keys.left?1:0) - (keys.right?1:0);
      let pitchX = (keys.up?1:0) - (keys.down?1:0);
      if (gameMode === 'phone') { bankX -= touchInput.x; pitchX -= touchInput.y; }
      if (gameMode === 'vr')    { bankX -= vrInput.x;    pitchX -= vrInput.y; }
      bankX = THREE.MathUtils.clamp(bankX, -1, 1);
      pitchX = THREE.MathUtils.clamp(pitchX, -1, 1);
      const targetRoll = bankX * 0.5;
      const targetPitch = pitchX * -0.35;
      ship.rotation.z += (targetRoll - ship.rotation.z) * Math.min(1, delta*6);
      ship.rotation.x += (targetPitch - ship.rotation.x) * Math.min(1, delta*6);
      ship.rotation.y += delta * 0.6;

      shipLight.intensity = 2 + Math.sin(elapsed * 8) * 0.4;

      // --- trail ---
      trailHistory.unshift(ship.position.clone());
      if (trailHistory.length > TRAIL_LEN) trailHistory.pop();
      for (let i = 0; i < TRAIL_LEN; i++) {
        const p = trailHistory[i] || ship.position;
        trailPositions[i*3] = p.x;
        trailPositions[i*3+1] = p.y;
        trailPositions[i*3+2] = p.z + 0.3 + i*0.12;
      }
      trailGeo.attributes.position.needsUpdate = true;
      trailMat.opacity = 0.3;

      // --- grid scroll ---
      grid.position.z = distanceTraveled % GRID_CELL;
      floorGlow.position.z = 0;

      // --- obstacles ---
      for (const ob of obstacles) {
        ob.position.z += speed * delta;
        ob.rotation.x += ob.userData.rotSpeed.x * delta;
        ob.rotation.y += ob.userData.rotSpeed.y * delta;
        ob.rotation.z += ob.userData.rotSpeed.z * delta;

        // boss hit-flash: briefly blow out to white, then settle to HP colour
        if (ob.userData.isBoss && ob.userData.hitFlash > 0) {
          ob.userData.hitFlash = Math.max(0, ob.userData.hitFlash - delta * 4);
          const f = ob.userData.hitFlash;
          const base = new THREE.Color(BOSS_HP_COLORS[ob.userData.hp] || 0xffde2e);
          const white = new THREE.Color(0xffffff);
          const mixed = base.clone().lerp(white, f);
          ob.userData.fillMesh.material.color.copy(mixed);
          ob.userData.edgeMesh.material.color.copy(mixed);
          ob.userData.fillMesh.material.opacity = 0.18 + f * 0.5;
        }

        if (ob.position.z > 12) {
          resetObstacle(ob, false);
          continue;
        }

        // collision check
        const dz = ob.position.z - ship.position.z;
        const window_ = ob.userData.scaledRadius + SHIP_RADIUS + 1.0;
        if (Math.abs(dz) < window_) {
          const dx = ob.position.x - ship.position.x;
          const dy = ob.position.y - ship.position.y;
          if (ob.userData.isBoss) {
            // axis-aligned box check for the cube (half-extent = 0.75 * scale)
            const half = 0.75 * BOSS_SCALE * 0.9; // 0.9 = slight forgiveness
            if (Math.abs(dx) < half + SHIP_RADIUS &&
                Math.abs(dy) < half + SHIP_RADIUS &&
                Math.abs(dz) < half + SHIP_RADIUS) {
              endGame();
            }
          } else {
            const distXY = Math.sqrt(dx*dx + dy*dy);
            if (distXY < (ob.userData.scaledRadius + SHIP_RADIUS) * 0.82) {
              endGame();
            }
          }
        }
      }

      // --- lasers ---
      for (let li = activeLasers.length - 1; li >= 0; li--) {
        const laser = activeLasers[li];
        if (!laser.alive) { activeLasers.splice(li, 1); continue; }

        // lasers travel along their velocity vector (forward, or toward gaze in VR)
        laser.group.position.addScaledVector(laser.velocity, delta);

        // remove if far from the ship in any direction
        if (laser.group.position.z < -300 ||
            laser.group.position.distanceTo(ship.position) > 320) {
          removeLaser(laser);
          activeLasers.splice(li, 1);
          continue;
        }

        // check laser-obstacle collision
        let hit = false;
        for (const ob of obstacles) {
          const dx = ob.position.x - laser.group.position.x;
          const dy = ob.position.y - laser.group.position.y;
          const dz = ob.position.z - laser.group.position.z;
          const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
          if (dist < ob.userData.scaledRadius * 0.85 + laser.radius) {
            triggerImpact(laser.group.position.clone(), laser.color);
            removeLaser(laser);
            activeLasers.splice(li, 1);
            hit = true;

            if (ob.userData.isBoss) {
              // boss takes damage rather than dying instantly
              ob.userData.hp -= 1;
              ob.userData.hitFlash = 1;
              if (ob.userData.hp <= 0) {
                // boss destroyed → big explosion, counts as 3 kills
                triggerImpact(ob.position.clone(), 0xffde2e);
                triggerImpact(ob.position.clone(), 0xff6b35);
                resetObstacle(ob, false);
                addKills(3);
              } else {
                // shift colour to show remaining HP
                const c = BOSS_HP_COLORS[ob.userData.hp];
                ob.userData.fillMesh.material.color.setHex(c);
                ob.userData.edgeMesh.material.color.setHex(c);
              }
            } else {
              // normal obstacle: instant destruction, counts as 1 kill
              resetObstacle(ob, false);
              addKills(1);
            }
            break;
          }
        }
        if (hit) continue;
      }

      // --- impact flashes ---
      for (let fi = impactFlashes.length - 1; fi >= 0; fi--) {
        const f = impactFlashes[fi];
        f.life -= delta * 3.2;
        if (f.life <= 0) {
          scene.remove(f.sprite);
          scene.remove(f.light);
          scene.remove(f.ring);
          for (const s of f.shards) scene.remove(s.mesh);
          for (const s of f.streaks) scene.remove(s.line);
          impactFlashes.splice(fi, 1);
          continue;
        }

        const t = 1 - f.life; // 0→1 as explosion ages
        const fadeOut = f.life * f.life;

        // glow flash: expand fast then fade
        f.sprite.material.opacity = fadeOut * 0.9;
        f.sprite.scale.setScalar(4 + t * 10);

        // point light dims
        f.light.intensity = f.life * 5;

        // ring: expand outward and fade
        const ringScale = 0.3 + t * 5;
        f.ring.scale.setScalar(ringScale);
        f.ring.material.opacity = f.life * 0.8;

        // debris shards: fly out with drag, spin, fade late
        for (const s of f.shards) {
          s.mesh.position.x += s.vx * delta;
          s.mesh.position.y += s.vy * delta - delta * 2.5; // slight gravity
          s.mesh.position.z += s.vz * delta;
          s.vx *= 0.92; s.vy *= 0.92; s.vz *= 0.92; // drag
          s.mesh.rotation.x += s.spin.x * delta;
          s.mesh.rotation.y += s.spin.y * delta;
          s.mesh.rotation.z += s.spin.z * delta;
          s.mesh.material.opacity = Math.max(0, f.life * 1.4 - 0.4);
        }

        // streaks: fly out and fade quickly
        for (const s of f.streaks) {
          s.line.position.x += s.vx * delta;
          s.line.position.y += s.vy * delta;
          s.line.position.z += s.vz * delta;
          s.vx *= 0.88; s.vy *= 0.88; s.vz *= 0.88;
          s.line.material.opacity = Math.max(0, f.life * 1.6 - 0.6);
        }
      }
      if (gameMode === 'vr') {
        // --- VR camera: sit above-and-behind the sphere, looking over its top ---
        const rigTargetX = ship.position.x;
        const rigTargetY = ship.position.y + 0.85; // elevate the vantage point over the top
        const rigTargetZ = ship.position.z + 2.4;  // pull back so the sphere doesn't fill the view
        cameraRig.position.x += (rigTargetX - cameraRig.position.x) * Math.min(1, delta*6);
        cameraRig.position.y += (rigTargetY - cameraRig.position.y) * Math.min(1, delta*6);
        cameraRig.position.z += (rigTargetZ - cameraRig.position.z) * Math.min(1, delta*6);

        // --- head-gaze reticle: project from head along its forward direction ---
        const headPos = new THREE.Vector3();
        const headDir = new THREE.Vector3();
        camera.getWorldPosition(headPos);
        camera.getWorldDirection(headDir);
        const reticleDist = 26;
        reticleGroup.position.copy(headPos).addScaledVector(headDir, reticleDist);
        // face the reticle back toward the player
        reticleGroup.lookAt(headPos);
        const pulse = 0.9 + Math.sin(performance.now() * 0.006) * 0.1;
        reticleGroup.scale.setScalar(pulse);
      } else {
        // desktop & phone camera
        const portrait = window.innerHeight > window.innerWidth;
        // On a portrait phone, lift the framing so the action sits in the upper
        // portion of the screen, above the joystick/fire controls.
        const yLift = (gameMode === 'phone' && portrait) ? 2.3 : 1.7;
        const lookYOffset = (gameMode === 'phone' && portrait) ? -1.6 : -0.2;
        const camTargetX = playerPos.x * 0.55;
        const camTargetY = playerPos.y + yLift;
        camera.position.x += (camTargetX - camera.position.x) * Math.min(1, delta*4);
        camera.position.y += (camTargetY - camera.position.y) * Math.min(1, delta*4);
        camera.position.z = 7.5;
        camera.lookAt(playerPos.x * 0.3, playerPos.y + lookYOffset, -30);
      }

      // --- HUD (DOM overlay; not visible in VR, so skip) ---
      if (gameMode !== 'vr') {
        scoreDisplay.textContent = elapsed.toFixed(1);
        speedDisplay.textContent = 'x' + (speed / BASE_SPEED).toFixed(1);
        killsDisplay.textContent = destroyedCount;
        const cooldownPct = Math.min(1, (elapsed - lastShotTime) / SHOT_COOLDOWN);
        const lvl = getLaserLevel();
        laserFill.style.width = (cooldownPct * 100) + '%';
        if (cooldownPct >= 1) {
          laserFill.style.background = 'linear-gradient(90deg, #00c4cc, #00f0ff)';
          laserFill.style.boxShadow = '0 0 10px #00f0ff, 0 0 20px rgba(0,240,255,0.5)';
          laserStatusLabel.textContent = `LASER LV.${lvl}  ·  READY`;
          laserStatusLabel.classList.add('ready');
        } else {
          const r = Math.round(120 + 135 * cooldownPct);
          const g = Math.round(10 + 36 * cooldownPct);
          const b = Math.round(30 + 97 * cooldownPct);
          laserFill.style.background = `rgb(${r},${g},${b})`;
          laserFill.style.boxShadow = `0 0 ${4 + cooldownPct * 8}px rgba(255,46,135,${0.3 + cooldownPct * 0.5})`;
          laserStatusLabel.textContent = `LASER LV.${lvl}  ·  COOLING`;
          laserStatusLabel.classList.remove('ready');
        }
      }
    } else {
      // idle ambient drift for camera on start screen (desktop/phone only)
      if (gameMode !== 'vr') {
        cameraRig.position.set(0, 0, 0); // ensure rig is neutral for non-VR camera math
        camera.position.x = Math.sin(performance.now()*0.0002) * 1.5;
        camera.position.y = 2.6 + Math.sin(performance.now()*0.00015) * 0.4;
        camera.position.z = 8;
        camera.lookAt(0, 1.5, -30);
      }
    }

    // --- explosion particles update ---
    if (particleLife > 0) {
      particleLife -= delta * 0.8;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particlePos[i*3]   += particleVelocities[i*3]   * delta;
        particlePos[i*3+1] += particleVelocities[i*3+1] * delta - delta*3; // gravity
        particlePos[i*3+2] += particleVelocities[i*3+2] * delta;
      }
      particleGeo.attributes.position.needsUpdate = true;
      particleMat.opacity = Math.max(0, particleLife);
    }

    // gentle sun bob
    sun.position.y = 17 + Math.sin(performance.now()*0.0003) * 1.2;
    halo.position.y = sun.position.y;

    renderer.render(scene, camera);
  }

  renderer.setAnimationLoop(animate);
})();
</script>
</body>
</html>
